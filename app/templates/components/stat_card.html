<div class="col-xl-3 col-lg-6 col-md-6 mb-4">

    <div class="stat-card card h-100">

        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center">

                <div>

                    <div class="text-secondary small mb-2">

                        {{ title }}

                    </div>

                    <h1 class="fw-bold mb-0">

                        {{ value }}

                    </h1>

                </div>

                <div class="stat-icon">

                    <i class="{{ icon }}"></i>

                </div>

            </div>

        </div>

    </div>

</div>
