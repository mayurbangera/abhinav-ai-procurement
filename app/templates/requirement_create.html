{% extends "layouts/base.html" %}

{% block title %}
Create Requirement
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold">
                Create Requirement
            </h2>

            <p class="text-muted">
                Create a new procurement requirement.
            </p>

        </div>

        <a
            href="/dashboard/requirements"
            class="btn btn-outline-primary">

            <i class="bi bi-arrow-left"></i>

            Back

        </a>

    </div>

    <div class="card shadow-sm border-0 rounded-4">

        <div class="card-body">

            <form id="requirementForm">

                <div class="row g-3">

                    <div class="col-md-6">

                        <label class="form-label">
                            Project Name
                        </label>

                        <input
                            id="project_name"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">
                            Site Name
                        </label>

                        <input
                            id="site_name"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">
                            Requested By
                        </label>

                        <input
                            id="requested_by"
                            class="form-control"
                            value="Avdhut Chakradhar">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">
                            Priority
                        </label>

                        <select
                            id="priority"
                            class="form-select">

                            <option value="HIGH">HIGH</option>

                            <option
                                value="MEDIUM"
                                selected>

                                MEDIUM

                            </option>

                            <option value="LOW">

                                LOW

                            </option>

                        </select>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">
                            Required Date
                        </label>

                        <input
                            id="required_date"
                            type="date"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-12">

                        <label class="form-label">
                            Purpose
                        </label>

                        <textarea
                            id="purpose"
                            rows="3"
                            class="form-control"
                            required></textarea>

                    </div>

                    <div class="col-md-12">

                        <label class="form-label">
                            Remarks
                        </label>

                        <textarea
                            id="remarks"
                            rows="2"
                            class="form-control"></textarea>

                    </div>

                </div>

                <hr>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Save Requirement

                </button>

            </form>

        </div>

    </div>

</div>

<script src="/static/js/requirement.js"></script>

{% endblock %}
